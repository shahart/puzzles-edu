syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.generalpuzzle.proto";
option java_outer_classname = "PuzzlesApplication";

service SolutionService {
  rpc Solve(IdRequest) returns (Solution) {}
}

message IdRequest {
  string id = 1;
}

message Solution {
  string id = 1;
  optional int32 res = 2;
}